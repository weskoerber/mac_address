name: test
on:
  pull_request:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    steps:
      - name: install zig
        uses: weskoerber/setup-zig@main
      - name: checkout
        uses: actions/checkout@v4
      - name: test
        run: zig build test
